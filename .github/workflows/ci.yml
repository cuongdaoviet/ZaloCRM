name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs on the same ref (PR or branch) when a new push lands.
# Only github.workflow and github.ref are used — both are safe (no untrusted user input).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, build, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # Real Postgres for integration tests. testcontainers is NOT used in CI
      # because it would require docker-in-docker; a service container is
      # simpler and matches the same engine version we use locally.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: zalocrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/zalocrm_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --accept-data-loss --url "$DATABASE_URL"

      - name: Build (tsc)
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        # Override the testcontainers-managed DB with the CI service container.
        # tests/integration/setup-db.ts honours USE_CI_DB=1 by skipping the
        # container and connecting straight to DATABASE_URL.
        env:
          USE_CI_DB: '1'
        run: npm run test:integration

  frontend:
    name: Frontend (type-check, build)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Run tests
        run: npm test
