#version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: zalo-crm-app
    restart: unless-stopped
    ports:
      - "3080:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-crmuser}:${DB_PASSWORD}@db:5432/${DB_NAME:-zalocrm}
      # Feature 0027 — MinIO/S3 attachment mirror. `S3_ENDPOINT` uses the
      # internal docker DNS name so the backend reaches MinIO over the
      # private bridge; `S3_PUBLIC_URL` is what we hand back to the FE.
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-http://localhost:9000}
      - S3_BUCKET=${S3_BUCKET:-zalocrm-attachments}
      # Feature 0046 BR-0008 — no `:-minioadmin` fallback. Operator
      # MUST set these explicitly; docker-compose fails fast otherwise.
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set — see .env.example}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set — see .env.example}
      - S3_REGION=${S3_REGION:-us-east-1}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/zalo-crm/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:16-alpine
    container_name: zalo-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-crmuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-zalocrm}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crmuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c max_connections=50

  # Feature 0027 — Object storage for chat attachments.
  # Feature 0046 BR-0008 — MinIO S3 API is bound to 127.0.0.1 ONLY.
  # Browsers reach `/attachments/*` through the nginx reverse proxy
  # service below, never the raw :9000 port. Console (admin UI) on
  # 127.0.0.1:9001 unchanged.
  minio:
    image: minio/minio:latest
    container_name: zalo-crm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # No `:-minioadmin` fallback — operator must set these.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Feature 0046 BR-0009 — nginx reverse proxy in front of MinIO.
  # `<img src="/attachments/...">` → nginx → MinIO bucket. The :9000
  # port is no longer exposed publicly.
  nginx:
    image: nginx:alpine
    container_name: zalo-crm-nginx
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      app:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Creates the bucket and sets anonymous-download policy. Idempotent —
  # safe to re-run on every `docker compose up`.
  minio-init:
    image: minio/mc:latest
    container_name: zalo-crm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${S3_BUCKET:-zalocrm-attachments};
      mc anonymous set download local/${S3_BUCKET:-zalocrm-attachments};
      exit 0;
      "
    environment:
      # No `:-minioadmin` fallback — pass through the values the
      # operator set on the minio service.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      S3_BUCKET: ${S3_BUCKET:-zalocrm-attachments}

  backup:
    image: prodrigestivill/postgres-backup-local
    container_name: zalo-crm-backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${DB_NAME:-zalocrm}
      POSTGRES_USER: ${DB_USER:-crmuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
    depends_on:
      - db

volumes:
  pg_data:
  file_storage:
  minio_data:
