# Feature 0046 BR-0009 — nginx reverse proxy in front of MinIO.
#
# `/attachments/<key>` requests from browser → nginx → MinIO bucket.
# We DO NOT expose the raw MinIO :9000 port publicly anymore; this is
# the only reachable path for downloading chat attachments.
#
# Why nginx and not the app: image/video downloads are CPU-light static
# transfers. Routing them through Node would burn event-loop time on
# each <img src>. nginx in front of MinIO is the standard pattern and
# keeps the Node process focused on API work.
#
# Path mapping:
#   /attachments/<key>            (what the FE renders in <img src>)
#       → http://minio:9000/zalocrm-attachments/<key>
#
# The bucket is configured by `minio-init` to allow anonymous-read.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Standard combined log — easy to ship to any log aggregator.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens off;

    # Upload size — MinIO has its own 20 MB limit but nginx enforces
    # an upper bound too. Match the @fastify/multipart per-file limit
    # to keep error surfaces aligned.
    client_max_body_size 25M;

    upstream zalocrm_minio {
        server minio:9000;
        keepalive 16;
    }

    server {
        listen      8080;
        server_name _;

        # Cheap liveness probe so docker-compose `healthcheck` doesn't
        # need to know about MinIO's URL.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Public attachment download path. The trailing slash on both
        # `location` and `proxy_pass` is intentional — it strips the
        # `/attachments/` prefix before forwarding so the URL the bucket
        # sees is `/zalocrm-attachments/<key>`.
        location /attachments/ {
            proxy_pass         http://zalocrm_minio/zalocrm-attachments/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            # Cache attachments aggressively at the edge — they are
            # content-addressed and never change once uploaded. 1 day
            # is a safe floor; CDN in front can override.
            proxy_cache_valid  200 302 1d;
            proxy_cache_valid  404 1m;
            add_header Cache-Control "public, max-age=86400, immutable";

            # Hide MinIO-specific response headers from clients.
            proxy_hide_header  x-amz-id-2;
            proxy_hide_header  x-amz-request-id;
            proxy_hide_header  Server;

            # Disable buffering for large objects (video) so the client
            # can start streaming immediately.
            proxy_buffering off;
            proxy_read_timeout 60s;
        }
    }
}
